<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إضافة قاعة جديدة</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start pt-20 font-sans">

  <div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-center mb-6">إضافة قاعة جديدة</h2>
    <form id="add-room-form" class="space-y-4">

      <!-- اسم/رقم القاعة -->
      <div>
        <label for="room-name" class="block mb-1 font-medium">اسم/رقم القاعة *</label>
        <input type="text" id="room-name" placeholder="مثال: قاعة 101" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- نوع القاعة -->
      <div>
        <label for="room-type" class="block mb-1 font-medium">نوع القاعة *</label>
        <select id="room-type" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">اختر نوع القاعة</option>
          <option value="Lecture">Lecture</option>
          <option value="Lab">Lab</option>
          <option value="Section">Section</option>
        </select>
      </div>

      <!-- السعة الاستيعابية -->
      <div>
        <label for="capacity" class="block mb-1 font-medium">السعة الاستيعابية *</label>
        <input type="number" id="capacity" min="1" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- الموقع / المبنى -->
      <div>
        <label for="location" class="block mb-1 font-medium">الموقع / المبنى *</label>
        <input type="text" id="location" placeholder="مثال: المبنى أ" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        <!-- لو تحب ممكن تغيرها لقائمة منسدلة -->
        <!--
        <select id="location" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">اختر المبنى</option>
          <option value="المبنى أ">المبنى أ</option>
          <option value="المبنى ب">المبنى ب</option>
          <option value="المبنى ج">المبنى ج</option>
        </select>
        -->
      </div>

      <button type="submit"
              class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors">
        إضافة القاعة
      </button>
    </form>
  </div>

  <script>
    const usedRoomNames = [];

    document.getElementById('add-room-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('room-name').value.trim();
      const type = document.getElementById('room-type').value;
      const capacity = document.getElementById('capacity').value;
      const location = document.getElementById('location').value.trim();

      // التحقق من الاسم الفريد
      if (usedRoomNames.includes(name)) {
        alert('اسم القاعة هذا مستخدم من قبل، يرجى إدخال اسم آخر.');
        return;
      }
      usedRoomNames.push(name);

      // إرسال البيانات للباك اند (استبدل الرابط برابط السيرفر الحقيقي)
      fetch('https://example.com/api/rooms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, type, capacity, location })
      })
      .then(res => res.json())
      .then(data => {
        alert(`تم إضافة القاعة بنجاح: ${data.name}`);
        this.reset();
      })
      .catch(err => {
        console.error(err);
        alert('حصل خطأ أثناء إضافة القاعة');
      });
    });
  </script>

</body>
</html>
