<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إضافة قسم جديد</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start pt-20 font-sans">

  <div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-center mb-6">إضافة قسم جديد</h2>
    <form id="add-department-form" class="space-y-4">

      <div>
        <label for="dept-name" class="block mb-1 font-medium">اسم القسم *</label>
        <input type="text" id="dept-name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label for="dept-code" class="block mb-1 font-medium">كود القسم *</label>
        <input type="text" id="dept-code" required placeholder="رقمي أو نصي"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label for="dept-description" class="block mb-1 font-medium">وصف القسم</label>
        <textarea id="dept-description" placeholder="اختياري"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 resize-vertical h-20"></textarea>
      </div>

      <div>
        <label for="dept-type" class="block mb-1 font-medium">نوع القسم *</label>
        <select id="dept-type" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">اختر نوع القسم</option>
          <option value="علمي – رياضه">علمي – رياضه</option>
          <option value="علمي – علوم">علمي – علوم</option>
        </select>
      </div>

      <div>
        <label for="dept-head" class="block mb-1 font-medium">رئيس القسم *</label>
        <select id="dept-head" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">اختر عضو هيئة تدريس</option>
          <option value="ahmed">أ. أحمد علي</option>
          <option value="fatma">أ. فاطمة حسين</option>
          <option value="mohamed">أ. محمد سامي</option>
        </select>
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
        إضافة القسم
      </button>
    </form>
  </div>

  <script>
    const usedCodes = [];

    document.getElementById('add-department-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('dept-name').value.trim();
      const code = document.getElementById('dept-code').value.trim();
      const description = document.getElementById('dept-description').value.trim();
      const type = document.getElementById('dept-type').value;
      const head = document.getElementById('dept-head').value;

      if (!type) {
        alert('يرجى اختيار نوع القسم.');
        return;
      }

      if (usedCodes.includes(code)) {
        alert('كود القسم هذا مستخدم من قبل، يرجى إدخال كود آخر.');
        return;
      }
      usedCodes.push(code);

      alert(`تم إضافة القسم:\nالاسم: ${name}\nالكود: ${code}\nالوصف: ${description || 'لا يوجد'}\nنوع القسم: ${type}\nرئيس القسم: ${head}`);
      this.reset();
    });
  </script>

</body>
</html>
